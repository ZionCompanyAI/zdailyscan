name: e2e

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools
          grep -v crawl4ai requirements.txt | pip install -r /dev/stdin
          pip install -e ".[dev]"

      - name: Start app
        run: |
          SCRAPER_MODE=mock \
          ALIEXPRESS_APP_KEY=ci \
          ALIEXPRESS_APP_SECRET=ci \
          ALIEXPRESS_TRACKING_ID=ci \
          TELEGRAM_BOT_TOKEN=ci \
          MC_API_KEY=ci \
          MC_URL=http://localhost:9999 \
          DASHBOARD_USERNAME=${{ secrets.DASHBOARD_USERNAME || 'admin' }} \
          DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }} \
          DASHBOARD_SESSION_SECRET=ci-test-secret \
          uvicorn app.main:app --port 8000 --log-level error &
          sleep 5

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:8000' }}
          DASHBOARD_USERNAME: ${{ secrets.DASHBOARD_USERNAME || 'admin' }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
