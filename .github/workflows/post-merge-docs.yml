name: Post-merge docs update

on:
  push:
    branches: [main]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update progress.md
        run: python3 scripts/update_progress.py
      - name: Update README modules section
        run: python3 scripts/update_readme.py
      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update progress e README [skip ci]"
