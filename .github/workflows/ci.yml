name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          grep -v crawl4ai requirements.txt | pip install -r /dev/stdin
          pip install -e ".[dev]" ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -x
