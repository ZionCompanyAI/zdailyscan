<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ZDailyScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: oklch(0.13 0.02 260);
      --color-surface: oklch(0.18 0.02 260);
      --color-surface-2: oklch(0.22 0.02 260);
      --color-border: oklch(0.30 0.02 260);
      --color-text: oklch(0.93 0.01 260);
      --color-text-muted: oklch(0.65 0.01 260);
      --color-accent: oklch(0.70 0.18 250);
      --color-accent-hover: oklch(0.75 0.18 250);
      --color-success: oklch(0.72 0.17 145);
      --color-warning: oklch(0.78 0.16 75);
      --color-danger: oklch(0.65 0.20 25);
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius: 0.5rem;
      --shadow: 0 1px 3px oklch(0 0 0 / 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
    }
    nav {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
    }
    .nav-brand {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-accent);
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 1.25rem; align-items: center; }
    .nav-links a {
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--color-text); }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  {% if user is defined and user %}
  <nav>
    <span class="nav-brand">ZDailyScan</span>
    <div class="nav-links">
      <a href="/dashboard">Relatórios</a>
      <a href="/logout">Sair ({{ user }})</a>
    </div>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
