<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ZDailyScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: oklch(0.13 0.02 260);
      --color-surface: oklch(0.18 0.02 260);
      --color-surface-2: oklch(0.22 0.02 260);
      --color-border: oklch(0.30 0.02 260);
      --color-text: oklch(0.93 0.01 260);
      --color-text-muted: oklch(0.65 0.01 260);
      --color-accent: oklch(0.70 0.18 250);
      --color-accent-hover: oklch(0.75 0.18 250);
      --color-success: oklch(0.72 0.17 145);
      --color-warning: oklch(0.78 0.16 75);
      --color-danger: oklch(0.65 0.20 25);
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius: 0.5rem;
      --shadow: 0 1px 3px oklch(0 0 0 / 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
    }

    /* Top nav — hidden on mobile, shown on desktop */
    .top-nav {
      display: none;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
    }
    .nav-brand {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-accent);
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 1.25rem; align-items: center; }
    .nav-links a {
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--color-text); }

    /* Bottom nav — mobile only, fixed to bottom */
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      z-index: 100;
    }
    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      padding: 0.55rem 0.25rem;
      text-decoration: none;
      color: var(--color-text-muted);
      font-size: 0.68rem;
      font-weight: 500;
      min-height: 56px;
      transition: color 0.15s;
    }
    .bottom-nav-item:hover { color: var(--color-accent); }
    .bottom-nav-item svg { width: 22px; height: 22px; flex-shrink: 0; }

    main {
      max-width: 1100px;
      margin: 0 auto;
      /* leave room for the fixed bottom nav on mobile */
      padding: 1.25rem 1rem 5.5rem;
    }

    @media (min-width: 768px) {
      .top-nav { display: flex; }
      .bottom-nav { display: none; }
      main { padding: 2rem 1.5rem; }
    }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  {% if user is defined and user %}
  <nav class="top-nav">
    <span class="nav-brand">ZDailyScan</span>
    <div class="nav-links">
      <a href="/dashboard">Relatórios</a>
      <a href="/dashboard/explorer">Explorer</a>
      <a href="/dashboard/scanner">Scanner</a>
      <a href="/dashboard/settings">Config</a>
      <a href="/logout">Sair ({{ user }})</a>
    </div>
  </nav>
  <nav class="bottom-nav" aria-label="Navegação principal">
    <a href="/dashboard" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Relatórios</span>
    </a>
    <a href="/dashboard/explorer" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>Explorer</span>
    </a>
    <a href="/dashboard/scanner" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Scanner</span>
    </a>
    <a href="/dashboard/settings" class="bottom-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Config</span>
    </a>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
